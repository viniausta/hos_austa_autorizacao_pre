# =============================================================================
# docker-compose.yml — hos_austa_autorizacaopre
#
# Serviços:
#   selenoid     → Selenoid (sessões isoladas por container Chrome)
#   selenoid-ui  → Dashboard visual em http://localhost:8080
#   rpa          → Robô Python conectado ao Selenoid via Remote WebDriver
#
# Uso:
#   docker compose up --build          → sobe tudo e reconstrói a imagem
#   docker compose up -d               → modo background
#   docker compose logs -f rpa         → acompanha logs do robô
#   docker compose down                → para e remove containers
#
# Debug visual (ver o navegador ao vivo):
#   Acesse http://localhost:8080 no browser (Selenoid-UI)
#
# IMPORTANTE — pull da imagem Chrome antes do primeiro uso:
#   docker pull selenoid/vnc_chrome:128.0
# =============================================================================

# Rede nomeada explicitamente para que o Selenoid possa colocar
# os containers de browser na mesma rede que o rpa.
networks:
  default:
    name: austa-net

services:

  # ---------------------------------------------------------------------------
  # Selenoid — orquestrador de sessões WebDriver
  #   - Cada sessão WebDriver ganha seu próprio container Chrome isolado
  #   - Expõe WebDriver na porta 4444 (consumido internamente pelo rpa)
  #   - Requer acesso ao Docker socket para criar/destruir containers de browser
  #   - browsers.json define qual imagem usar por versão de browser
  # ---------------------------------------------------------------------------
  selenoid:
    image: aerokube/selenoid:latest
    container_name: austa_selenoid
    ports:
      - "4444:4444"   # WebDriver API
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Selenoid cria containers via Docker
      - ./selenoid:/etc/selenoid:ro                  # browsers.json
      - selenoid_logs:/opt/selenoid/logs
    command: >
      -conf /etc/selenoid/browsers.json
      -log-output-dir /opt/selenoid/logs
      -container-network austa-net
      -limit 4
    environment:
      - TZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Selenoid-UI — dashboard visual das sessões ativas
  #   - Acesse http://localhost:8080 para ver os browsers em tempo real
  #   - Clique em qualquer sessão para abrir o VNC interativo
  # ---------------------------------------------------------------------------
  selenoid-ui:
    image: aerokube/selenoid-ui:latest
    container_name: austa_selenoid_ui
    ports:
      - "8080:8080"   # Dashboard → http://localhost:8080
    command: ["--selenoid-uri", "http://selenoid:4444"]
    depends_on:
      - selenoid
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Robô RPA (Python)
  #   - Em Linux nativo: roda no Docker, SMB direto para o share do TASY
  #   - Em Windows: pode rodar no host (pip install + python api_server.py)
  #     e conectar ao Selenoid via localhost:4444
  #   - Aguarda o Selenoid estar healthy antes de iniciar
  # ---------------------------------------------------------------------------
  rpa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: austa_rpa
    hostname: "940-2023-00373"
    command: python api_server.py
    env_file:
      - .env
    environment:
      - SELENIUM_REMOTE_URL=http://selenoid:4444/wd/hub
      - ORACLE_INSTANT_CLIENT_DIR=/opt/oracle/instantclient_21_11
    ports:
      - "8000:8000"
    depends_on:
      selenoid:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./logs:/app/logs
      - evidencias:/app/Evidencia
      - ${TASY_STORAGE_HOST_PATH:-./tasy-storage}:/mnt/tasy-storage

# ---------------------------------------------------------------------------
# Volumes nomeados
# ---------------------------------------------------------------------------
volumes:
  evidencias:
  selenoid_logs:
    driver: local
